<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portofolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <div class="sidebar-logo-icon">🌊</div>
            <div class="sidebar-logo-text">
                <strong>Portfolio</strong>
                <small>Admin Panel</small>
            </div>
        </div>

        <div class="sidebar-profile">
            <div class="sidebar-avatar">A</div>
            <div class="sidebar-profile-info">
                <div class="sidebar-profile-name">Administrator</div>
                <div class="sidebar-profile-role">Super Admin</div>
            </div>
            <div class="sidebar-status"></div>
        </div>

        <nav>
            <span class="nav-section-label">Navigation</span>
            <a href="dashboard.html">
                <span class="nav-icon"><i class="fas fa-gauge-high"></i></span>
                Dashboard
            </a>
            <a href="profiles.html">
                <span class="nav-icon"><i class="fas fa-user-circle"></i></span>
                Profil
            </a>
            <a href="akun.html">
                <span class="nav-icon"><i class="fas fa-shield-halved"></i></span>
                Akun
            </a>
            <div class="sidebar-divider"></div>
            <span class="nav-section-label">Content</span>
            <a href="experience.html">
                <span class="nav-icon"><i class="fas fa-briefcase"></i></span>
                Experience
            </a>
            <a href="projects.html">
                <span class="nav-icon"><i class="fas fa-folder-open"></i></span>
                Projects
            </a>
            <a href="skills.html">
                <span class="nav-icon"><i class="fas fa-code"></i></span>
                Skills
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="../../index.html">
                <i class="fas fa-arrow-up-right-from-square" style="color:var(--cyan-400)"></i>
                Lihat Website
            </a>
        </div>
    </aside>

    <main class="content">
        <section class="panel">
            <h2 class="section-title">Panel Admin</h2>
            <p style="color:var(--text-muted)">Pilih menu di samping untuk mengelola data portofolio.</p>
        </section>
    </main>

    <script src="js/base.js"></script>
    <script>
        // Mobile sidebar toggle
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const menuBtn = document.getElementById('mobileMenuBtn');
        if (menuBtn) {
            menuBtn.addEventListener('click', () => {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('active');
            });
        }
        overlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        });

        // Mark active link
        const links = document.querySelectorAll('.sidebar nav a');
        links.forEach(a => {
            if (a.href === location.href) a.classList.add('active');
        });
    </script>
</body>
</html>
